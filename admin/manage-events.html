<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Manage Events - Samanwaya Admin</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-dashboard">
    <header class="admin-header">
        <div class="container">
            <h1>Admin Dashboard</h1>
            <nav class="admin-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="manage-events.html" class="active">Manage Events</a>
                <a href="manage-news.html">Manage News</a>
                <a href="#" onclick="logout()">Logout</a>
            </nav>
        </div>
    </header>

    <main class="admin-content">
        <div class="container">
            <div class="admin-card">
                <h2>Manage Events</h2>
                <p>Add, edit, or delete events for the website.</p>
                
                <div id="messageArea" style="margin-top: 20px;"></div>
                
                <form id="eventForm" style="margin-top: 30px;">
                    <input type="hidden" id="eventId">
                    <div class="form-group">
                        <label for="eventTitle">Event Title</label>
                        <input type="text" id="eventTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="eventDate">Event Date</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label for="eventLocation">Location</label>
                        <input type="text" id="eventLocation" required>
                    </div>
                    <div class="form-group">
                        <label for="eventDescription">Description</label>
                        <textarea id="eventDescription" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-secondary">Save Event</button>
                    <button type="button" class="btn btn-primary" onclick="resetForm()" style="margin-left: 10px;">Cancel</button>
                </form>
            </div>

            <div class="admin-card">
                <h3>Published Events</h3>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Date</th>
                            <th>Location</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="eventsTableBody">
                        <!-- Events will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/manage-events.js"></script>
</body>
</html>
