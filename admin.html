<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Samanwaya Admin | Event Management</title>
    <link rel="stylesheet" href="/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="bg-cream text-text-main p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <h1 class="font-serif text-4xl text-primary-green">Admin Portal</h1>
            <a href="/" class="text-xs font-bold uppercase tracking-widest text-text-main/40 hover:text-accent-green">Back to Site</a>
        </div>

        <div id="auth-section" class="bg-white p-12 rounded-[2rem] shadow-xl text-center">
            <h2 class="font-serif text-2xl mb-8">Authorized Access Only</h2>
            <button id="login-btn" class="px-8 py-4 bg-primary-green text-white rounded-full font-bold hover:bg-accent-green transition-all shadow-lg">
                Login with Google
            </button>
        </div>

        <div id="admin-content" class="hidden space-y-12">
            <!-- Add Event Form -->
            <section class="bg-white p-8 md:p-12 rounded-[2rem] shadow-xl">
                <h3 class="font-serif text-2xl mb-8 text-primary-green">Add New Event</h3>
                <form id="event-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest font-bold text-text-main/40">Event Title</label>
                            <input type="text" id="title" required class="w-full bg-cream/30 border-b border-stone-200 py-3 focus:outline-none focus:border-accent-green text-lg" placeholder="e.g. Youth Coordination Workshop" />
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest font-bold text-text-main/40">Date</label>
                            <input type="date" id="date" required class="w-full bg-cream/30 border-b border-stone-200 py-3 focus:outline-none focus:border-accent-green" />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest font-bold text-text-main/40">Location</label>
                        <input type="text" id="location" required class="w-full bg-cream/30 border-b border-stone-200 py-3 focus:outline-none focus:border-accent-green" placeholder="e.g. Kathmandu City Hall" />
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-widest font-bold text-text-main/40">Description</label>
                        <textarea id="description" rows="3" required class="w-full bg-cream/30 border-b border-stone-200 py-3 focus:outline-none focus:border-accent-green resize-none" placeholder="Brief details about the event..."></textarea>
                    </div>
                    <button type="submit" class="w-full py-4 bg-primary-green text-white font-bold rounded-full hover:bg-accent-green transition-all">
                        Publish Event
                    </button>
                </form>
            </section>

            <!-- Event List -->
            <section class="bg-white p-8 md:p-12 rounded-[2rem] shadow-xl">
                <h3 class="font-serif text-2xl mb-8 text-primary-green">Manage Events</h3>
                <div id="admin-events-list" class="space-y-4">
                    <!-- Events will be listed here -->
                    <p class="text-text-main/40 italic">Loading events...</p>
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="/admin.js"></script>
</body>
</html>
